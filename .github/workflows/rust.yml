name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo +nightly build --verbose
    - name: Run tests
      run: cargo +nightly test --verbose
    - name: Install criterion-hypothesis
      run: cargo +nightly install criterion-hypothesis
    - name: Run benchmarks
      run: |
        cargo +nightly run -p criterion-hypothesis --release -- \
        --baseline ${{ github.event.pull_request.base.sha || 'HEAD~1' }} \
        --candidate ${{ github.sha }}
