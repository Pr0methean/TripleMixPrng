name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo +nightly build --verbose --tests
    - name: Run tests
      run: cargo +nightly test --verbose
  benchmarks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [ ubuntu-latest, ubuntu-24.04-arm, macos-26-intel, macos-latest, windows-latest, windows-11-arm ]
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-26-intel, windows-latest ]
      fail-fast: false
    steps:
    - name: Checkout candidate and baseline
      uses: actions/checkout@v6
      if: ${{ github.event_name != 'pull_request' }}
      with:
        fetch-depth: 2
    - name: Checkout candidate
      uses: actions/checkout@v6
      if: ${{ github.event_name == 'pull_request' }}
      with:
        fetch-depth: 1
    - name: Fetch baseline
      if: ${{ github.event_name == 'pull_request' }}
      run: git fetch origin ${{ github.event.pull_request.base.sha }}
    - name: Install criterion-hypothesis
      run: cargo +nightly install criterion-hypothesis
    - name: Run benchmarks
      run: >
        criterion-hypothesis -v --harness-output
        --baseline ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
        --candidate ${{ github.sha }}