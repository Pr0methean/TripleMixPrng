name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo +nightly build --verbose --tests
    - name: Run tests
      run: cargo +nightly test --verbose
  benchmarks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Fetch baseline
      run: git fetch origin ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
    - name: Install criterion-hypothesis
      run: cargo +nightly install criterion-hypothesis
    - name: Run benchmarks
      run: |
        criterion-hypothesis -v \
        --baseline ${{ github.event.pull_request.base.sha || 'HEAD~1' }} \
        --candidate ${{ github.sha }}