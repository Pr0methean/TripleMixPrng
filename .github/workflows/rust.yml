name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ (github.ref == 'refs/heads/master' && github.sha) || (github.event_name == 'pull_request' && github.head_ref) || github.ref }}
  cancel-in-progress: false

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        feature-flag: [ "--no-default-features", "--all-features" ]
        include:
          - os: ubuntu-latest
            toolchain: nightly
            target: x86_64-unknown-linux-gnu
            asan-flag: "-Zsanitizer=address"
          - os: ubuntu-24.04-arm
            toolchain: nightly
            target: aarch64-unknown-linux-gnu
            asan-flag: "-Zsanitizer=address"
          - os: macos-26-intel
            toolchain: nightly
            target: x86_64-apple-darwin
            asan-flag: "-Zsanitizer=address"
          - os: windows-latest
            toolchain: nightly
            target: x86_64-pc-windows-msvc
            asan-flag: "-Zsanitizer=address"
          - os: windows-11-arm
            toolchain: nightly
            target: aarch64-pc-windows-msvc
            asan-flag: ""
          - os: macos-latest
            toolchain: nightly-2026-01-28 # FIXME: Unpin once https://github.com/rust-lang/rust/issues/153397 is fixed
            target: aarch64-apple-darwin
            asan-flag: "-Zsanitizer=address"
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-26-intel, windows-latest, windows-11-arm ]
      fail-fast: false
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run tests
      run: cargo +nightly test --verbose ${{ matrix.feature-flag }} --target ${{ matrix.target }}
      timeout-minutes: 20
      env:
        RUSTFLAGS: -D warnings ${{ matrix.asan-flag }}
  benchmarks:
    needs: unit-tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm, macos-26-intel, macos-latest, windows-latest, windows-11-arm ]
      fail-fast: false
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install libtss2-dev (Ubuntu x86)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install libtss2-dev
    - name: Run benchmarks
      run: cargo +nightly bench --features reproducibility_cross_platform -- --output-format bencher | tee bench-output.txt
      timeout-minutes: 20
    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1.21.0
      with:
        name: Rust Benchmark
        tool: 'cargo'
        output-file-path: bench-output.txt
        github-token: ${{ secrets.GITHUB_TOKEN }}
        summary-always: true
        auto-push: ${{ github.event_name != 'pull_request' }}
        # Show alert with commit comment on detecting possible performance regression
        alert-threshold: '125%'
        comment-on-alert: true
        fail-on-alert: true