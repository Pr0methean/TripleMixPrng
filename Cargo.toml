[package]
name = "triple_mix_prng"
version = "0.1.0"
edition = "2024"

[dependencies]
rand_core = "0.10.0"
xoroshiro128 = "0.5.0"
tinymt = "1.0.9"
generic-array = "1.3.5"
rs_shake256 = "0.1.2"
rs_hasher_ctx = "0.1.3"
rand = "0.10.0"
hex = { version = "0.4.3", optional = true }

[[bin]]
name = "triple_mix_prng"
required-features = ["hex"]

[profile.release]
lto = "fat"
codegen-units = 1

[dev-dependencies]
rand = "0.10.0"
hypors = "0.3.0"
