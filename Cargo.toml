[package]
name = "triple_mix_prng"
version = "0.1.0"
edition = "2024"

[dependencies]
rand_core = "0.10.0"
generic-array = "1.3.5"
rs_shake256 = "0.1.2"
rs_hasher_ctx = "0.1.3"
rand = "0.10.0"
typenum = { version = "1.19.0", features = ["const-generics"] }
genetic_algorithm = "0.27.0"
log = "0.4.29"
simple-log = "2.4.0"
hypors = "0.3.0"
statrs = "0.18.0"
stack-sizes = "0.5.0"

[[bench]]
name = "benchmarks"
harness = false

[profile.release]
lto = "fat"
codegen-units = 1

[profile.test]
opt-level = 3

[dev-dependencies]
rand = "0.10.0"
criterion = "0.8.2"
